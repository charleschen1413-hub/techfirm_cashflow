<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC設計新創現金流推演模型 (雙產品線)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --purple-color: #9b59b6;
            --orange-color: #e67e22;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-color: #334155;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 24px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        
        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 700;
        }
        
        header p {
            margin: 5px 0 0 0;
            color: #64748b;
            font-size: 14px;
        }
        
        .summary-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        
        .summary-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #475569;
        }
        
        .summary-card p {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
        }
        
        .summary-card p.danger { color: var(--danger-color); }
        .summary-card p.success { color: var(--success-color); }
        .summary-card p.orange { color: var(--orange-color); }
        
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .input-group {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        
        .input-group h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--primary-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }
        
        .input-group.product1 h2 { border-left-color: var(--accent-color); }
        .input-group.product2 h2 { border-left-color: var(--orange-color); }
        
        .form-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13.5px;
        }
        
        .form-row label {
            color: #334155;
            font-weight: 500;
        }
        
        .input-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .form-row input {
            width: 80px;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: right;
            font-size: 13px;
        }
        
        .form-row input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        
        /* 隱藏數字輸入框的上下箭頭，方便直接點擊輸入 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield; /* Firefox 支援 */
            cursor: text;
        }
        
        .unit {
            font-size: 12px;
            color: #64748b;
            width: 30px;
        }
        
        /* 新增：收合面板樣式 */
        details.input-group summary {
            list-style: none;
            cursor: pointer;
            outline: none;
        }
        details.input-group summary::-webkit-details-marker {
            display: none;
        }
        details.input-group summary h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.2s;
        }
        details:not([open]).input-group summary h2 {
            margin-bottom: 0;
        }
        details.input-group summary h2::after {
            content: "▼";
            font-size: 14px;
            color: #94a3b8;
        }
        details[open].input-group summary h2::after {
            content: "▲";
        }
        details.input-group summary:hover h2 {
            color: var(--accent-color);
        }
        
        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            background: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>新創現金流推演 (2.5億資本 + 雙產品線)</h1>
        <p>觀察第二顆產品 (M=20 光罩, M=26 營收) 加入後對長期現金流的疊加效應</p>
    </header>

    <div class="summary-dashboard">
        <div class="summary-card">
            <h3>每月固定營運支出 (OPEX)</h3>
            <p id="sum-burn-rate">0 萬</p>
        </div>
        <div class="summary-card">
            <h3 id="p1-profit-title">第一顆產品總毛利 (5年)</h3>
            <p id="sum-p1-profit" style="color: var(--accent-color);">0 萬</p>
        </div>
        <div class="summary-card">
            <h3 id="p2-profit-title">第二顆產品總毛利 (5年)</h3>
            <p id="sum-p2-profit" class="orange">0 萬</p>
        </div>
        <div class="summary-card">
            <h3>破產危機預警</h3>
            <p id="sum-zero-month" class="danger">計算中...</p>
        </div>
        <div class="summary-card">
            <h3 id="final-month-title">期末現金結餘</h3>
            <p id="sum-final-cash">0 萬</p>
        </div>
        <div class="summary-card">
            <h3>最終年營收表現</h3>
            <p id="sum-last-year">0 萬</p>
            <div style="font-size: 12px; color: #666; margin-top: 5px;" id="sum-last-year-sub"></div>
        </div>
    </div>

    <div class="grid-layout">
        <!-- 核心營運與資金 -->
        <details class="input-group" open>
            <summary><h2>1. 核心資金與基礎設定</h2></summary>
            <div class="form-row">
                <label>模擬推演年限 (3~10年)</label>
                <div class="input-container">
                    <input type="number" id="sim-years" value="5" min="3" max="10">
                    <span class="unit">年</span>
                </div>
            </div>
            <div class="form-row">
                <label>初始資本額</label>
                <div class="input-container">
                    <input type="number" id="capital" value="25000">
                    <span class="unit">萬元</span>
                </div>
            </div>
            <div class="form-row" style="background-color: #f8f4ff; padding: 4px; border-radius: 4px;">
                <label style="color: var(--purple-color); font-weight: bold;">B輪融資 (月份 / 金額)</label>
                <div class="input-container">
                    <input type="number" id="funding-b-month" value="48" style="width: 50px;">
                    <input type="number" id="funding-b-amount" value="10000" style="width: 70px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>產品綜合毛利率 (%)</label>
                <div class="input-container">
                    <input type="number" id="gross-margin" value="40">
                    <span class="unit">%</span>
                </div>
            </div>
            <div class="form-row">
                <label>RD (人數/年薪)</label>
                <div class="input-container">
                    <input type="number" id="rd-count" value="18" style="width: 50px;">
                    <input type="number" id="rd-salary" value="250" style="width: 60px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>SA (人數/年薪)</label>
                <div class="input-container">
                    <input type="number" id="sa-count" value="5" style="width: 50px;">
                    <input type="number" id="sa-salary" value="180" style="width: 60px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>PM (人數/年薪)</label>
                <div class="input-container">
                    <input type="number" id="pm-count" value="2" style="width: 50px;">
                    <input type="number" id="pm-salary" value="200" style="width: 60px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>業務 (人數/年薪)</label>
                <div class="input-container">
                    <input type="number" id="sales-count" value="4" style="width: 50px;">
                    <input type="number" id="sales-salary" value="120" style="width: 60px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>行政 (人數/年薪)</label>
                <div class="input-container">
                    <input type="number" id="admin-count" value="5" style="width: 50px;">
                    <input type="number" id="admin-salary" value="80" style="width: 60px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>CAD Tool 年費</label>
                <div class="input-container">
                    <input type="number" id="cad-cost" value="200">
                    <span class="unit">萬元</span>
                </div>
            </div>
        </details>

        <!-- 產品一 -->
        <details class="input-group product1" open>
            <summary><h2>2. 產品 1 (藍色曲線)</h2></summary>
            <div class="form-row">
                <label>光罩月份 / 費用</label>
                <div class="input-container">
                    <input type="number" id="p1-mask-month" value="18" style="width: 50px;">
                    <input type="number" id="p1-mask-cost" value="800" style="width: 70px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>營收起始月份</label>
                <div class="input-container">
                    <input type="number" id="p1-rev-start" value="24">
                    <span class="unit">月</span>
                </div>
            </div>
            <div class="form-row">
                <label>Phase 1 (營收首年) 營收</label>
                <div class="input-container">
                    <input type="number" id="p1-rev1" value="1000">
                    <span class="unit">萬/月</span>
                </div>
            </div>
            <div class="form-row">
                <label>Phase 2 (營收次年) 營收</label>
                <div class="input-container">
                    <input type="number" id="p1-rev2" value="2000">
                    <span class="unit">萬/月</span>
                </div>
            </div>
            <div class="form-row">
                <label>Phase 3 (第三年起) 營收</label>
                <div class="input-container">
                    <input type="number" id="p1-rev3" value="3000">
                    <span class="unit">萬/月</span>
                </div>
            </div>
        </details>

        <!-- 產品二 -->
        <details class="input-group product2" open>
            <summary><h2>3. 產品 2 (橘色曲線)</h2></summary>
            <div class="form-row">
                <label>光罩月份 / 費用</label>
                <div class="input-container">
                    <input type="number" id="p2-mask-month" value="20" style="width: 50px;">
                    <input type="number" id="p2-mask-cost" value="800" style="width: 70px;">
                    <span class="unit">萬</span>
                </div>
            </div>
            <div class="form-row">
                <label>營收起始月份 (預設M+6)</label>
                <div class="input-container">
                    <input type="number" id="p2-rev-start" value="26">
                    <span class="unit">月</span>
                </div>
            </div>
            <div class="form-row">
                <label>Phase 1 (營收首年) 營收</label>
                <div class="input-container">
                    <input type="number" id="p2-rev1" value="1000">
                    <span class="unit">萬/月</span>
                </div>
            </div>
            <div class="form-row">
                <label>Phase 2 (營收次年) 營收</label>
                <div class="input-container">
                    <input type="number" id="p2-rev2" value="2000">
                    <span class="unit">萬/月</span>
                </div>
            </div>
            <div class="form-row">
                <label>Phase 3 (第三年起) 營收</label>
                <div class="input-container">
                    <input type="number" id="p2-rev3" value="3000">
                    <span class="unit">萬/月</span>
                </div>
            </div>
        </details>
    </div>

    <div class="chart-container">
        <canvas id="cashflowChart"></canvas>
    </div>

    <div class="chart-container" style="margin-top: 20px;">
        <canvas id="annualRevenueChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;
    let annualChart = null;

    function calculateAndRender() {
        // 讀取設定參數
        const simYears = parseInt(document.getElementById('sim-years').value) || 5;
        const totalMonths = Math.max(36, Math.min(120, simYears * 12));
        
        const capital = parseFloat(document.getElementById('capital').value) || 0;
        const fundingBMonth = parseInt(document.getElementById('funding-b-month').value) || 0;
        const fundingBAmount = parseFloat(document.getElementById('funding-b-amount').value) || 0;
        const grossMargin = parseFloat(document.getElementById('gross-margin').value) || 0;
        
        const rdCount = parseFloat(document.getElementById('rd-count').value) || 0;
        const rdSalary = parseFloat(document.getElementById('rd-salary').value) || 0;
        const saCount = parseFloat(document.getElementById('sa-count').value) || 0;
        const saSalary = parseFloat(document.getElementById('sa-salary').value) || 0;
        const pmCount = parseFloat(document.getElementById('pm-count').value) || 0;
        const pmSalary = parseFloat(document.getElementById('pm-salary').value) || 0;
        const salesCount = parseFloat(document.getElementById('sales-count').value) || 0;
        const salesSalary = parseFloat(document.getElementById('sales-salary').value) || 0;
        const adminCount = parseFloat(document.getElementById('admin-count').value) || 0;
        const adminSalary = parseFloat(document.getElementById('admin-salary').value) || 0;
        const cadCost = parseFloat(document.getElementById('cad-cost').value) || 0;
        
        // 產品 1
        const p1MaskMonth = parseInt(document.getElementById('p1-mask-month').value) || 18;
        const p1MaskCost = parseFloat(document.getElementById('p1-mask-cost').value) || 0;
        const p1RevStart = parseInt(document.getElementById('p1-rev-start').value) || 24;
        const p1Rev1 = parseFloat(document.getElementById('p1-rev1').value) || 0;
        const p1Rev2 = parseFloat(document.getElementById('p1-rev2').value) || 0;
        const p1Rev3 = parseFloat(document.getElementById('p1-rev3').value) || 0;

        // 產品 2
        const p2MaskMonth = parseInt(document.getElementById('p2-mask-month').value) || 20;
        const p2MaskCost = parseFloat(document.getElementById('p2-mask-cost').value) || 0;
        const p2RevStart = parseInt(document.getElementById('p2-rev-start').value) || 26;
        const p2Rev1 = parseFloat(document.getElementById('p2-rev1').value) || 0;
        const p2Rev2 = parseFloat(document.getElementById('p2-rev2').value) || 0;
        const p2Rev3 = parseFloat(document.getElementById('p2-rev3').value) || 0;

        // OPEX 計算
        const totalYearlyOpex = (rdCount * rdSalary) + (saCount * saSalary) + (pmCount * pmSalary) + (salesCount * salesSalary) + (adminCount * adminSalary) + cadCost;
        const monthlyOpex = totalYearlyOpex / 12;

        const labels = [];
        const cumulativeCashData = [];
        const monthlyNetData = [];
        const p1RevData = [];
        const p2RevData = [];
        
        let currentCash = capital;
        let zeroMonth = null;
        let totalP1Profit = 0;
        let totalP2Profit = 0;
        
        let lastYearRev = 0;
        let lastYearNet = 0;
        
        // 準備年度營收統計陣列
        const annualRevenues = new Array(simYears).fill(0);

        // 動態月份迴圈
        for (let m = 1; m <= totalMonths; m++) {
            labels.push(`M${m}`);
            
            // 支出
            let cashOutflow = monthlyOpex;
            if (m === p1MaskMonth) cashOutflow += p1MaskCost;
            if (m === p2MaskMonth) cashOutflow += p2MaskCost;

            // 產品 1 營收計算 (相對月份)
            let rev1 = 0;
            if (m >= p1RevStart) {
                let monthsActive1 = m - p1RevStart + 1;
                if (monthsActive1 <= 12) rev1 = p1Rev1;
                else if (monthsActive1 <= 24) rev1 = p1Rev2;
                else rev1 = p1Rev3;
            }

            // 產品 2 營收計算 (相對月份)
            let rev2 = 0;
            if (m >= p2RevStart) {
                let monthsActive2 = m - p2RevStart + 1;
                if (monthsActive2 <= 12) rev2 = p2Rev1;        
                else if (monthsActive2 <= 24) rev2 = p2Rev2;   
                else rev2 = p2Rev3;                           
            }

            p1RevData.push(rev1);
            p2RevData.push(rev2);
            
            // 累加年度營收
            let currentYearIndex = Math.ceil(m / 12) - 1;
            if (currentYearIndex < simYears) {
                annualRevenues[currentYearIndex] += (rev1 + rev2);
            }

            let gp1 = rev1 * (grossMargin / 100);
            let gp2 = rev2 * (grossMargin / 100);
            totalP1Profit += gp1;
            totalP2Profit += gp2;

            // 融資
            let financingCash = (m === fundingBMonth) ? fundingBAmount : 0;

            // 淨流
            let netCashFlow = (gp1 + gp2) - cashOutflow + financingCash;
            monthlyNetData.push(netCashFlow);

            currentCash += netCashFlow;
            cumulativeCashData.push(currentCash);

            if (currentCash < 0 && zeroMonth === null) zeroMonth = m;
            
            // 統計最後12個月的營收與淨流
            if (m > totalMonths - 12) {
                lastYearRev += (rev1 + rev2);
                lastYearNet += netCashFlow;
            }
        }

        // 更新 Dashboard
        document.getElementById('sum-burn-rate').innerText = monthlyOpex.toFixed(1) + ' 萬';
        
        // 動態更新毛利標題年份與轉換為「億」
        document.getElementById('p1-profit-title').innerText = `第一顆產品總毛利 (${simYears}年)`;
        document.getElementById('sum-p1-profit').innerText = (totalP1Profit / 10000).toFixed(2) + ' 億';
        
        document.getElementById('p2-profit-title').innerText = `第二顆產品總毛利 (${simYears}年)`;
        document.getElementById('sum-p2-profit').innerText = (totalP2Profit / 10000).toFixed(2) + ' 億';
        
        const zeroMonthEl = document.getElementById('sum-zero-month');
        if (zeroMonth) {
            zeroMonthEl.innerText = `M${zeroMonth} 資金斷鏈`;
            zeroMonthEl.className = 'danger';
        } else {
            zeroMonthEl.innerText = '安全度過';
            zeroMonthEl.className = 'success';
        }

        const finalCashEl = document.getElementById('sum-final-cash');
        finalCashEl.innerText = (currentCash / 10000).toFixed(2) + ' 億';
        finalCashEl.className = currentCash >= 0 ? 'success' : 'danger';
        
        document.getElementById('final-month-title').innerText = `期末結餘 (${totalMonths}個月)`;
        
        // 更新最後一年營收指標與轉換為「億」
        const lastYearEl = document.getElementById('sum-last-year');
        const lastYearSubEl = document.getElementById('sum-last-year-sub');
        if (lastYearRev === 0) {
            lastYearEl.innerText = (lastYearNet / 10000).toFixed(2) + ' 億';
            lastYearEl.className = 'danger';
            lastYearSubEl.innerText = '純支出階段 (無營收)';
        } else {
            lastYearEl.innerText = (lastYearRev / 10000).toFixed(2) + ' 億';
            lastYearEl.className = 'success';
            lastYearSubEl.innerText = `淨現金流: ${lastYearNet > 0 ? '+' : ''}${(lastYearNet / 10000).toFixed(2)} 億`;
        }

        // 繪製圖表
        const ctx = document.getElementById('cashflowChart').getContext('2d');
        
        const chartData = {
            labels: labels,
            datasets: [
                {
                    type: 'line',
                    label: '累積現金水位',
                    data: cumulativeCashData,
                    borderColor: '#2980b9',
                    backgroundColor: 'rgba(41, 128, 185, 0.05)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.1,
                    yAxisID: 'y',
                    order: 1
                },
                {
                    type: 'line',
                    label: '產品 1 營收 (右軸)',
                    data: p1RevData,
                    borderColor: 'rgba(52, 152, 219, 0.8)',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    yAxisID: 'y1',
                    pointRadius: 0,
                    order: 2
                },
                {
                    type: 'line',
                    label: '產品 2 營收 (右軸)',
                    data: p2RevData,
                    borderColor: 'rgba(230, 126, 34, 0.8)',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    yAxisID: 'y1',
                    pointRadius: 0,
                    order: 3
                },
                {
                    type: 'bar',
                    label: '單月總淨流',
                    data: monthlyNetData,
                    backgroundColor: monthlyNetData.map((val, idx) => {
                        if (idx + 1 === fundingBMonth && fundingBAmount > 0) return 'rgba(155, 89, 182, 0.8)'; // 融資
                        return val >= 0 ? 'rgba(39, 174, 96, 0.6)' : 'rgba(231, 76, 60, 0.6)';
                    }),
                    yAxisID: 'y1',
                    order: 4
                }
            ]
        };

        if (myChart) {
            myChart.data = chartData;
            myChart.update();
        } else {
            myChart = new Chart(ctx, {
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 20 } },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: '累積資金 (萬)' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: { display: true, text: '單月淨流 & 營收 (萬)' },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }
        
        // 繪製或更新年度營收長條圖 (Chart 2)
        const annualCtx = document.getElementById('annualRevenueChart').getContext('2d');
        const annualLabels = Array.from({length: simYears}, (_, i) => `第 ${i + 1} 年`);
        
        const annualChartData = {
            labels: annualLabels,
            datasets: [{
                label: '年度總營收 (萬元)',
                data: annualRevenues,
                backgroundColor: 'rgba(52, 152, 219, 0.7)',
                borderColor: 'rgba(41, 128, 185, 1)',
                borderWidth: 1
            }]
        };

        if (annualChart) {
            annualChart.data = annualChartData;
            annualChart.update();
        } else {
            annualChart = new Chart(annualCtx, {
                type: 'bar',
                data: annualChartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '年度總營收趨勢',
                            font: { size: 16, weight: 'bold' },
                            color: '#2c3e50'
                        },
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' 營收: ' + context.parsed.y.toFixed(1) + ' 萬';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: '年度營收 (萬)' }
                        }
                    }
                }
            });
        }
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculateAndRender);
    });

    window.addEventListener('DOMContentLoaded', calculateAndRender);
</script>

</body>
</html>
